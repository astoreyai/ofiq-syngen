site_name: ofiq-syngen
site_description: ISO/IEC 29794-5 component-aligned synthetic face image quality degradation
site_url: https://astoreyai.github.io/ofiq-syngen
repo_url: https://github.com/astoreyai/ofiq-syngen
repo_name: astoreyai/ofiq-syngen
edit_uri: edit/main/docs/

docs_dir: docs

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
    - scheme: slate
      primary: indigo
      accent: indigo
  features:
    - navigation.sections
    - navigation.expand
    - content.code.copy
    - search.suggest
    - search.highlight

nav:
  - Home: index.md
  - Usage: USAGE.md
  - Citing: CITING.md
  - Theory:
      - Overview: theory/index.md
      - Per-component status: theory/COMPONENT_STATUS.md
      - Algorithmic analysis: ANALYSIS.md
  - Standards:
      - Multi-standard mapping: standards/MAPPING.md
      - OFIQ source provenance: standards/PROVENANCE.md
      - Sources and pinning: standards/SOURCES.md
      - ISO 29794-5 coverage: ISO_COVERAGE.md
      - Failure modes: FAILURE_MODES.md
  - Gallery:
      - Overview: gallery/README.md
  - Project:
      - Contributing: CONTRIBUTING.md
      - OFIQ upstream policy: OFIQ_UPSTREAM.md
      - Code of Conduct: CODE_OF_CONDUCT.md
      - Changelog: CHANGELOG.md

plugins:
  - search
  - include-markdown
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            show_source: false
            show_root_heading: true
            members_order: source

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - toc:
      permalink: true
