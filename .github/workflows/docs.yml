name: Docs

on:
  # Manual trigger only until docs_dir restructure (mkdocs strict-mode requires
  # docs to live in a child directory, not the package root). See issue #1.
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install docs dependencies
        run: |
          pip install -e .
          pip install mkdocs mkdocs-material mkdocstrings[python]
      - name: Build site
        run: mkdocs build --strict
      - name: Upload pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./site
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
