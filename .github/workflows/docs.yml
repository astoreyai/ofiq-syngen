name: Docs

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install docs dependencies
        run: |
          pip install -e .
          pip install mkdocs mkdocs-material mkdocstrings[python] mkdocs-include-markdown-plugin
      - name: Build site
        # Not --strict: gallery strip PNGs are intentionally gitignored
        # (26 MB; regenerable locally via scripts/regenerate_gallery.py
        # from a face image that is itself license-restricted). The CI
        # build keeps the gallery markdown pages with broken image
        # links so users see the gallery structure; local builds with
        # the strips populated render the actual images.
        run: mkdocs build
      - name: Upload pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./site
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
