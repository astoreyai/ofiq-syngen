name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly Monday 06:00 UTC — catches new CVEs in pinned deps without
    # waiting for an unrelated push.
    - cron: "0 6 * * 1"
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

jobs:
  pip-audit:
    name: Dependency vulnerability scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install pip-audit
        run: |
          python -m pip install --upgrade pip
          pip install pip-audit
      - name: Audit runtime dependencies
        # Audit the package's *resolved* runtime deps without installing
        # heavy optional extras (torch, diffusers, gdown). This keeps the
        # scan fast and focused on the always-imported surface.
        run: pip-audit --strict --desc

  codeql:
    name: CodeQL static analysis
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        language: ["python"]
    steps:
      - uses: actions/checkout@v4
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          # Vendored DECA is MIT third-party code and out of scope for
          # our security posture; exclude it so CodeQL focuses on
          # ofiq-syngen's own surface.
          config: |
            paths-ignore:
              - src/third_party/**
              - notebooks/**
              - site/**
      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"
